<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LogiOS シミュレーター</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
  font-size: 14px;
  background: #F9FAFB;
  color: #111827;
}

/* ── ヘッダー ── */
header {
  background: #1E3A5F;
  color: white;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
}
header h1 { font-size: 18px; font-weight: 700; }

#restartBtn {
  background: #F59E0B; color: #111; border: none;
  padding: 8px 18px; border-radius: 6px; font-weight: 700;
  cursor: pointer; font-size: 14px;
}
#restartBtn:hover { background: #D97706; }

/* ── タブ ── */
.tab-bar {
  display: flex; flex-wrap: wrap; gap: 4px;
  padding: 10px 16px 0; background: #E5E7EB;
  border-bottom: 2px solid #D1D5DB;
}
.tab-btn {
  padding: 7px 12px; border: none; background: #D1D5DB;
  border-radius: 6px 6px 0 0; cursor: pointer; font-size: 13px; color: #374151;
}
.tab-btn:hover { background: #9CA3AF; color: white; }
.tab-btn.active { background: white; color: #1E3A5F; font-weight: 700; border-bottom: 2px solid white; }

.tab-content { display: none; padding: 16px; }
.tab-content.active { display: block; }

/* ── カード ── */
.card {
  background: white; border-radius: 10px; padding: 16px;
  margin-bottom: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.08);
}
.card h2 { font-size: 16px; margin-bottom: 10px; color: #1E3A5F; }
.card h3 { font-size: 14px; margin-bottom: 8px; color: #374151; }

/* ── バッジ ── */
.badge {
  display: inline-block; padding: 3px 10px; border-radius: 12px;
  font-size: 12px; font-weight: 700;
}
.badge-running  { background: #1E40AF; color: white; }
.badge-done     { background: #9CA3AF; color: white; }
.badge-idle     { background: #F3F4F6; color: #6B7280; border: 1px solid #D1D5DB; }
.badge-plan     { background: #065F46; color: white; }
.badge-complete { background: #D97706; color: white; }

/* ── LogiOSタブ 2カラムレイアウト ── */
.os-layout {
  display: grid;
  grid-template-columns: 220px 1fr;
  gap: 16px;
  align-items: start;
}
@media (max-width: 700px) {
  .os-layout { grid-template-columns: 1fr; }
}

/* ── フロー図（左カラム） ── */
.flow-col { display: flex; flex-direction: column; align-items: center; }
.flow-box {
  width: 100%; border: 2px solid #D1D5DB; border-radius: 8px;
  padding: 9px 12px; text-align: center; font-weight: 600; font-size: 13px;
  background: #F3F4F6; color: #6B7280;
  transition: background 0.2s, color 0.2s;
}
.flow-box.running  { background: #1E40AF; color: white; border-color: #1E40AF; }
.flow-box.done     { background: #9CA3AF; color: white; border-color: #9CA3AF; }
.flow-box.planning { background: #065F46; color: white; border-color: #065F46; }
.flow-arrow { font-size: 20px; color: #9CA3AF; line-height: 1.4; margin: 2px 0; text-align: center; }

/* ── 右パネル ── */
.right-col { display: flex; flex-direction: column; gap: 12px; }
.panel-card {
  background: white; border-radius: 8px; padding: 12px 14px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.07);
}
.panel-card h3 {
  font-size: 13px; font-weight: 700; color: #1E3A5F;
  border-bottom: 1px solid #E5E7EB; padding-bottom: 6px; margin-bottom: 8px;
}
.var-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.var-item { background: #F3F4F6; border-radius: 6px; padding: 6px 10px; }
.var-label { font-size: 10px; color: #9CA3AF; margin-bottom: 1px; }
.var-value { font-size: 12px; font-weight: 600; font-family: monospace; color: #111827; word-break: break-all; }

.cond-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 5px 0; border-bottom: 1px dashed #E5E7EB; font-size: 13px;
}
.cond-row:last-child { border-bottom: none; }
.cond-label { color: #374151; }
.cond-wait  { color: #9CA3AF; }
.cond-ok    { color: #065F46; font-weight: 700; }
.cond-done  { color: #1E40AF; font-weight: 700; }

.plan-mini { width: 100%; border-collapse: collapse; font-size: 12px; }
.plan-mini td { padding: 4px 6px; border-bottom: 1px solid #F3F4F6; }
.plan-mini tr:last-child td { border-bottom: none; }
.plan-mini tr.current-leg td { background: #DBEAFE; font-weight: 700; color: #1E40AF; }
.now-here { color: #D97706; font-weight: 700; font-size: 11px; }

.event-mini { list-style: none; max-height: 160px; overflow-y: auto; }
.event-mini li { display: flex; gap: 8px; padding: 3px 0; border-bottom: 1px dashed #E5E7EB; font-size: 12px; }
.event-mini li:last-child { border-bottom: none; }
.event-mini .et { color: #9CA3AF; min-width: 62px; }
.event-mini .ea { min-width: 72px; font-weight: 600; }
.ea-os  { color: #1E40AF; }
.ea-app { color: #065F46; }

/* ── 各appタブ ── */
.app-svg-wrap { text-align: center; margin: 8px 0 12px; }

.app-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.app-info-item { background: #F3F4F6; border-radius: 6px; padding: 8px 12px; }
.app-info-item .label { font-size: 11px; color: #6B7280; margin-bottom: 2px; }
.app-info-item .value { font-size: 13px; font-weight: 600; word-break: break-all; }

/* 発行IDカード（own_id を大きく・prev_refをその下に） */
.id-card {
  background: #F0FDF4; border: 1px solid #A7F3D0; border-radius: 8px; padding: 12px 14px;
}
.id-card .id-label { font-size: 11px; color: #065F46; font-weight: 700; margin-bottom: 4px; }
.id-card .id-value {
  font-family: monospace; font-size: 16px; font-weight: 800;
  color: #065F46; word-break: break-all; margin-bottom: 8px;
}
.id-card .prev-label { font-size: 11px; color: #6B7280; margin-bottom: 2px; }
.id-card .prev-value { font-family: monospace; font-size: 13px; color: #374151; word-break: break-all; }

.data-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; margin-top: 6px; }
.data-item { background: #F0FDF4; border-radius: 6px; padding: 6px 10px; border-left: 3px solid #059669; }
.data-item .label { font-size: 10px; color: #6B7280; }
.data-item .value { font-size: 13px; font-weight: 700; color: #065F46; }
.data-status-ok { color: #065F46 !important; }
.data-status-ng { color: #DC2626 !important; }

.event-list { list-style: none; margin-top: 8px; }
.event-list li {
  padding: 5px 0; border-bottom: 1px dashed #E5E7EB;
  font-size: 13px; display: flex; gap: 8px;
}
.event-list li:last-child { border-bottom: none; }
.event-time { color: #9CA3AF; min-width: 70px; }
.event-text { color: #111827; }

/* ── 名寄せ台帳 ── */
.chain-item {
  display: flex; gap: 12px; padding: 10px 14px;
  background: #F8FAFC; border-left: 4px solid #1E40AF;
  border-radius: 0 8px 8px 0; margin-bottom: 6px;
}
.chain-arrow { text-align: center; color: #9CA3AF; font-size: 18px; margin: 2px 0; }
.chain-app { font-weight: 700; min-width: 90px; color: #1E3A5F; font-size: 13px; }
.chain-ids { font-size: 12px; color: #374151; font-family: monospace; }
.chain-own  { color: #065F46; font-weight: 700; }
.chain-prev { color: #6B7280; }

/* ── 全体ログ ── */
.log-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.log-table th, .log-table td {
  text-align: left; padding: 5px 8px; border-bottom: 1px solid #E5E7EB;
}
.log-table th { background: #F3F4F6; font-weight: 700; position: sticky; top: 0; z-index: 1; }
.log-table tr:hover td { background: #F0F9FF; }
.log-wrap { overflow-x: auto; max-height: 70vh; overflow-y: auto; }
.log-os    { color: #1E40AF; font-weight: 600; }
.log-app   { color: #065F46; }
.log-ref   { font-family: monospace; font-size: 11px; color: #374151; }
.log-ref-linked { color: #065F46; font-weight: 700; }

@media (max-width: 600px) {
  .app-info-grid { grid-template-columns: 1fr; }
  .var-grid { grid-template-columns: 1fr; }
  .data-grid { grid-template-columns: 1fr 1fr; }
  .tab-btn { font-size: 11px; padding: 5px 7px; }
}
</style>
</head>
<body>

<header>
  <h1>🚚 LogiOS シミュレーター（JS完結版）</h1>
  <button id="restartBtn">🔄 リスタート</button>
</header>

<div class="tab-bar">
  <button class="tab-btn active" data-tab="os">🗂️ LogiOS</button>
  <button class="tab-btn" data-tab="app01">①発荷主</button>
  <button class="tab-btn" data-tab="app02">②輸送</button>
  <button class="tab-btn" data-tab="app03">③発地ハブ</button>
  <button class="tab-btn" data-tab="app04">④輸送(自動)</button>
  <button class="tab-btn" data-tab="app05">⑤着地ハブ</button>
  <button class="tab-btn" data-tab="app06">⑥輸送</button>
  <button class="tab-btn" data-tab="app07">⑦着荷主</button>
  <button class="tab-btn" data-tab="chain">🔗 名寄せ台帳</button>
  <button class="tab-btn" data-tab="log">📋 全体ログ</button>
</div>

<div id="tab-os-content"     class="tab-content active"></div>
<div id="tab-app01-content"  class="tab-content"></div>
<div id="tab-app02-content"  class="tab-content"></div>
<div id="tab-app03-content"  class="tab-content"></div>
<div id="tab-app04-content"  class="tab-content"></div>
<div id="tab-app05-content"  class="tab-content"></div>
<div id="tab-app06-content"  class="tab-content"></div>
<div id="tab-app07-content"  class="tab-content"></div>
<div id="tab-chain-content"  class="tab-content"></div>
<div id="tab-log-content"    class="tab-content"></div>

<script>
// ═══════════════════════════════════════════════════
// 定数
// ═══════════════════════════════════════════════════
const SHIPMENT_MASTER = {
  shipment_id: "SHP-001",
  hub_id: "HUB-KUSATSU-TANAKAMI",
  destination_address: "東京都港区芝公園4-2-8（東京タワー）",
  desired_arrival_date: "2026-06-21",
  weight_kg: 8.5,
  quantity: 2,
  contents: "精密機器部品",
};

const ROUTES_MASTER = [
  { leg_app: "app02", from: "通天閣", to: "草津田上IC", mode: "一般道・非自動運転", distance_km: 50, speed_kmh: 50 },
  { leg_app: "app03", from: "草津田上IC（ハブ内）", to: "草津田上IC（ハブ内）", mode: "ハブ仕分け", distance_km: 0, speed_kmh: 0, fixed_minutes: 30 },
  { leg_app: "app04", from: "草津田上IC", to: "綾瀬IC", mode: "高速道路・自動運転", distance_km: 450, speed_kmh: 90 },
  { leg_app: "app05", from: "綾瀬IC（ハブ内）", to: "綾瀬IC（ハブ内）", mode: "ハブ仕分け", distance_km: 0, speed_kmh: 0, fixed_minutes: 30 },
  { leg_app: "app06", from: "綾瀬IC", to: "東京タワー", mode: "一般道・非自動運転", distance_km: 30, speed_kmh: 40 },
];

const APP_LABELS = {
  app01: "①発荷主", app02: "②輸送", app03: "③発地ハブ",
  app04: "④輸送(自動)", app05: "⑤着地ハブ", app06: "⑥輸送", app07: "⑦着荷主",
};

// 各主体の own_id のラベル（各主体は自社フォーマットのIDを使う）
const APP_ID_LABELS = {
  app01: "Shipment ID（発荷主フォーマット）",
  app02: "Shipment ID（輸送業者Aフォーマット）",
  app03: "Shipment ID（発地ハブフォーマット）",
  app04: "Shipment ID（自動運転業者フォーマット）",
  app05: "Shipment ID（着地ハブフォーマット）",
  app06: "Shipment ID（輸送業者Bフォーマット）",
  app07: "Shipment ID（着荷主フォーマット）",
};

// ═══════════════════════════════════════════════════
// 状態変数
// ═══════════════════════════════════════════════════
let currentState = "IDLE";
let exchangeLog  = [];
let idChain      = { shipment_id: null, id_chain: [] };
let currentPlan  = null;
let appReports   = {};
let simRunning   = false;

// ポストプロセッシング用：現在実行中のleg情報を保持
let rightPanel = {
  instruction: null,
  leg: null,
  ownId: null,
  ownIssued: false,
  reportDone: false,
};

// ═══════════════════════════════════════════════════
// ユーティリティ
// ═══════════════════════════════════════════════════
function wait(ms) { return new Promise(r => setTimeout(r, ms)); }
function nowTime() { return new Date().toLocaleTimeString("ja-JP"); }
function yyyymmdd(d) { return d.toISOString().slice(0, 10).replace(/-/g, ""); }
function randomAlpha(n) {
  const c = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
  return Array.from({ length: n }, () => c[Math.floor(Math.random() * c.length)]).join("");
}
function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
// 「→ SHP-001 ✓ 紐づけ済み」のリファレンス文字列
function linkedRef(shipmentId) { return `→ ${shipmentId} ✓ 紐づけ済み`; }

// ═══════════════════════════════════════════════════
// 計画フェーズ
// ═══════════════════════════════════════════════════
function calculateMinutes(route) {
  if (route.speed_kmh > 0) return Math.round((route.distance_km / route.speed_kmh) * 60 * 10) / 10;
  return route.fixed_minutes || 30;
}

function createPlan(shipment) {
  const legs = ROUTES_MASTER.map((route, i) => ({
    seq: i + 1,
    leg_id: `LEG-${String(i + 1).padStart(2, "0")}`,
    app: route.leg_app,
    from: route.from,
    to: route.to,
    mode: route.mode,
    distance_km: route.distance_km,
    speed_kmh: route.speed_kmh,
    estimated_minutes: calculateMinutes(route),
  }));
  const totalMinutes = legs.reduce((sum, l) => sum + l.estimated_minutes, 0);
  return {
    plan_id: "PLAN-001",
    shipment_id: shipment.shipment_id,
    created_at: new Date().toISOString(),
    legs,
    total_estimated_minutes: totalMinutes,
  };
}

// ═══════════════════════════════════════════════════
// ID 発行
// ═══════════════════════════════════════════════════
function genId01() { return `TK-ORD-${yyyymmdd(new Date())}-001`; }
function genId02() { return `CA-WAYBILL-${String(Math.floor(Math.random() * 999999)).padStart(6, "0")}`; }
function genId03() { return `KST-IN-${yyyymmdd(new Date())}-001`; }
function genId04() { return `AUTO-JOB-${randomAlpha(8)}`; }
function genId05() { const d = new Date(); d.setDate(d.getDate() + 1); return `AYS-IN-${yyyymmdd(d)}-001`; }
function genId06() { return `CB-WAYBILL-${String(Math.floor(Math.random() * 999999)).padStart(6, "0")}`; }
function genId07() { const d = new Date(); d.setDate(d.getDate() + 1); return `TT-RCV-${yyyymmdd(d)}-001`; }

// ═══════════════════════════════════════════════════
// ログ
// ═══════════════════════════════════════════════════
function logExchange(app, eventName, shipmentId, extra = {}) {
  exchangeLog.push({ timestamp: nowTime(), app, event: eventName, shipment_id: shipmentId, ...extra });
  renderExchangeLogTab();
  if (app !== "LogiOS") renderAppTab(app);
  renderOsRightPanel();
}

function logInstruction(targetApp, leg, prevRef, shipmentId) {
  const inst = {
    instruction_id: `OS-INST-${targetApp.toUpperCase()}`,
    issued_at: nowTime(),
    target_app: targetApp,
    shipment_id: shipmentId,
    leg_id: leg.leg_id,
    from_location: leg.from,
    to_location: leg.to,
    prev_ref: prevRef,
  };
  // 右パネル更新
  rightPanel.instruction = inst;
  rightPanel.leg = leg;
  rightPanel.ownId = null;
  rightPanel.ownIssued = false;
  rightPanel.reportDone = false;

  exchangeLog.push({
    ...inst,
    timestamp: inst.issued_at,
    app: "LogiOS",
    event: `${APP_LABELS[targetApp]}へ指示送信`,
    logi_ref: shipmentId,       // LogiOS内部の共通ID
  });
  renderExchangeLogTab();
  return inst;
}

// ═══════════════════════════════════════════════════
// 名寄せ台帳
// ═══════════════════════════════════════════════════
function appendToChain(shipmentId, app, ownId, prevRef) {
  if (idChain.shipment_id !== shipmentId) idChain = { shipment_id: shipmentId, id_chain: [] };
  idChain.id_chain.push({ app, own_id: ownId, prev_ref: prevRef });
  renderIdChainTab();
}
function resetChain() { idChain = { shipment_id: null, id_chain: [] }; }

// ═══════════════════════════════════════════════════
// 各 app 実行
// logi_ref: own_id → （完了時）「→ SHP-001 ✓ 紐づけ済み」
// ═══════════════════════════════════════════════════
async function runApp01() {
  const ownId = genId01();
  const sid = SHIPMENT_MASTER.shipment_id;
  logExchange("app01", "出荷準備完了", sid, {
    own_id: ownId, weight_kg: SHIPMENT_MASTER.weight_kg,
    quantity: SHIPMENT_MASTER.quantity, status: "OK",
    logi_ref: ownId,
  });
  await wait(3000);
  logExchange("app01", "出荷完了", sid, {
    own_id: ownId, quantity: SHIPMENT_MASTER.quantity, status: "OK",
    logi_ref: linkedRef(sid),
  });
  return { ...SHIPMENT_MASTER, own_id: ownId, prev_ref: null };
}

// 輸送系（②）
async function runApp02(instruction) {
  const ownId = genId02();
  const sid = instruction.shipment_id;
  rightPanel.ownId = ownId; rightPanel.ownIssued = true;
  logExchange("app02", "受取（輸送開始）", sid, {
    carrier_id: ownId,
    leg_info: `${instruction.from_location}→${instruction.to_location}（一般道・非自動運転）`,
    quantity: SHIPMENT_MASTER.quantity,
    logi_ref: ownId,
  });
  await wait(3000);
  rightPanel.reportDone = true;
  logExchange("app02", "引渡（輸送終了）", sid, {
    carrier_id: ownId, quantity: SHIPMENT_MASTER.quantity,
    logi_ref: linkedRef(sid),
  });
  return { app: "app02", own_id: ownId, prev_ref: instruction.prev_ref, shipment_id: sid, completed_at: new Date().toISOString() };
}

// ハブ系（③）
async function runApp03(instruction) {
  const ownId = genId03();
  const sid = instruction.shipment_id;
  rightPanel.ownId = ownId; rightPanel.ownIssued = true;
  logExchange("app03", "受取", sid, {
    hub_id: ownId, quantity: SHIPMENT_MASTER.quantity,
    weight_kg: SHIPMENT_MASTER.weight_kg, status: "OK",
    logi_ref: ownId,
  });
  await wait(3000);
  rightPanel.reportDone = true;
  logExchange("app03", "出荷準備完了", sid, {
    hub_id: ownId, quantity: SHIPMENT_MASTER.quantity,
    weight_kg: SHIPMENT_MASTER.weight_kg, status: "OK",
    logi_ref: linkedRef(sid),
  });
  return { app: "app03", own_id: ownId, prev_ref: instruction.prev_ref, shipment_id: sid, completed_at: new Date().toISOString() };
}

// 輸送系（④ 自動運転）
async function runApp04(instruction) {
  const ownId = genId04();
  const sid = instruction.shipment_id;
  rightPanel.ownId = ownId; rightPanel.ownIssued = true;
  logExchange("app04", "受取（輸送開始）", sid, {
    carrier_id: ownId,
    leg_info: `${instruction.from_location}→${instruction.to_location}（高速道路・自動運転）`,
    quantity: SHIPMENT_MASTER.quantity,
    logi_ref: ownId,
  });
  await wait(3000);
  rightPanel.reportDone = true;
  logExchange("app04", "引渡（輸送終了）", sid, {
    carrier_id: ownId, quantity: SHIPMENT_MASTER.quantity,
    logi_ref: linkedRef(sid),
  });
  return { app: "app04", own_id: ownId, prev_ref: instruction.prev_ref, shipment_id: sid, completed_at: new Date().toISOString() };
}

// ハブ系（⑤）
async function runApp05(instruction) {
  const ownId = genId05();
  const sid = instruction.shipment_id;
  rightPanel.ownId = ownId; rightPanel.ownIssued = true;
  logExchange("app05", "受取", sid, {
    hub_id: ownId, quantity: SHIPMENT_MASTER.quantity,
    weight_kg: SHIPMENT_MASTER.weight_kg, status: "OK",
    logi_ref: ownId,
  });
  await wait(3000);
  rightPanel.reportDone = true;
  logExchange("app05", "出荷準備完了", sid, {
    hub_id: ownId, quantity: SHIPMENT_MASTER.quantity,
    weight_kg: SHIPMENT_MASTER.weight_kg, status: "OK",
    logi_ref: linkedRef(sid),
  });
  return { app: "app05", own_id: ownId, prev_ref: instruction.prev_ref, shipment_id: sid, completed_at: new Date().toISOString() };
}

// 輸送系（⑥）
async function runApp06(instruction) {
  const ownId = genId06();
  const sid = instruction.shipment_id;
  rightPanel.ownId = ownId; rightPanel.ownIssued = true;
  logExchange("app06", "受取（輸送開始）", sid, {
    carrier_id: ownId,
    leg_info: `${instruction.from_location}→${instruction.to_location}（一般道・非自動運転）`,
    quantity: SHIPMENT_MASTER.quantity,
    logi_ref: ownId,
  });
  await wait(3000);
  rightPanel.reportDone = true;
  logExchange("app06", "引渡（輸送終了）", sid, {
    carrier_id: ownId, quantity: SHIPMENT_MASTER.quantity,
    logi_ref: linkedRef(sid),
  });
  return { app: "app06", own_id: ownId, prev_ref: instruction.prev_ref, shipment_id: sid, completed_at: new Date().toISOString() };
}

// 着荷主（⑦）
async function runApp07(instruction) {

const APP_RUNNERS = { app02: runApp02, app03: runApp03, app04: runApp04, app05: runApp05, app06: runApp06, app07: runApp07 };

// ═══════════════════════════════════════════════════
// 状態機械メインループ
// ═══════════════════════════════════════════════════
async function runSimulation() {
  if (simRunning) return;
  simRunning = true;

  setState("APP01_RUNNING");
  const shipment = await runApp01();
  appReports["app01"] = shipment;
  setState("APP01_DONE");

  setState("OS_PLANNING");
  await wait(500);
  currentPlan = createPlan(shipment);
  logExchange("LogiOS", `輸送プラン作成完了（合計${currentPlan.total_estimated_minutes}分）`, shipment.shipment_id, {
    plan_id: currentPlan.plan_id,
    logi_ref: shipment.shipment_id,
  });
  setState("OS_PLAN_READY");
  await wait(500);

  appendToChain(shipment.shipment_id, "app01", shipment.own_id, null);
  let prevRef = shipment.own_id;

  for (const leg of currentPlan.legs) {
    const appKey = leg.app;
    setState(`OS_INSTRUCTING_${appKey.toUpperCase()}`);
    const instruction = logInstruction(appKey, leg, prevRef, shipment.shipment_id);
    renderOsTab();

    setState(`${appKey.toUpperCase()}_RUNNING`);
    const report = await APP_RUNNERS[appKey](instruction);
    appReports[appKey] = report;
    setState(`${appKey.toUpperCase()}_DONE`);

    appendToChain(shipment.shipment_id, appKey, report.own_id, report.prev_ref);
    prevRef = report.own_id;
    renderOsTab();
  }

  // app07（着荷主）は ROUTES_MASTER 外なので明示的に実行
  const app07Leg = { leg_id: "LEG-07", from: "東京都港区芝公園4-2-8", to: "東京都港区芝公園4-2-8（東京タワー）" };
  setState("OS_INSTRUCTING_APP07");
  const app07Instruction = logInstruction("app07", app07Leg, prevRef, shipment.shipment_id);
  renderOsTab();

  setState("APP07_RUNNING");
  const app07Report = await runApp07(app07Instruction);
  appReports["app07"] = app07Report;
  setState("APP07_DONE");
  appendToChain(shipment.shipment_id, "app07", app07Report.own_id, app07Report.prev_ref);

  setState("ALL_DONE");
  simRunning = false;
}

function setState(s) {
  currentState = s;
  renderOsTab();
  // _DONE 遷移時に該当appタブのバッジを更新
  const m = s.match(/^(APP\d\d)_(RUNNING|DONE)$/);
  if (m) renderAppTab(m[1].toLowerCase());
  if (s === "ALL_DONE") renderAllAppTabs();
}

function getFlowBoxClass(boxType) {
  if (boxType === "planning") {
    if (currentState === "OS_PLANNING" || currentState === "OS_PLAN_READY") return "planning";
    if (isAfterApp("app01")) return "done";
    return "";
  }
  const upper = boxType.toUpperCase();
  if (currentState === `${upper}_RUNNING` || currentState === `OS_INSTRUCTING_${upper}`) return "running";
  if (isAfterApp(boxType)) return "done";
  return "";
}

function buildFlowHtml() {
  const steps = [
    { key: "app01",    label: "① 発荷主（通天閣）" },
    { key: "planning", label: "LogiOS：計画作成" },
    { key: "app02",    label: "② 輸送（一般道）" },
    { key: "app03",    label: "③ 発地ハブ（草津）" },
    { key: "app04",    label: "④ 輸送（自動運転）" },
    { key: "app05",    label: "⑤ 着地ハブ（綾瀬）" },
    { key: "app06",    label: "⑥ 輸送（一般道）" },
    { key: "app07",    label: "⑦ 着荷主（東京タワー）" },
  ];
  return steps.map((s, i) => {
    const cls = getFlowBoxClass(s.key);
    const arrow = i < steps.length - 1 ? `<div class="flow-arrow">↓</div>` : "";
    return `<div class="flow-box ${cls}">${esc(s.label)}</div>${arrow}`;
  }).join("");
}

    condHtml = `<div class="cond-row"><span class="cond-label">own_id 発行</span><span class="cond-wait">— 待機中</span></div>

  } else {
    const ownStatus = rightPanel.ownIssued

    const rptStatus = rightPanel.reportDone
      ? `<span class="cond-done">✅ 完了</span>`
      : `<span class="cond-wait">⏳ 待機中</span>`;
    condHtml = `<div class="cond-row"><span class="cond-label">own_id 発行</span>${ownStatus}</div>
                <div class="cond-row"><span class="cond-label">完了報告</span>${rptStatus}</div>`;
  }

  let planHtml = `<p style="color:#9CA3AF;font-size:12px">計画フェーズ完了後に表示されます</p>`;
  if (currentPlan) {
    const h = Math.floor(currentPlan.total_estimated_minutes / 60);
    const m = currentPlan.total_estimated_minutes % 60;
    const currentLegApp = rightPanel.instruction ? rightPanel.instruction.target_app : null;
    const rows = currentPlan.legs.map(l => {
      const isNow = l.app === currentLegApp && !rightPanel.reportDone;
      const cls = isNow ? " class=\"current-leg\"" : "";
      const nowMark = isNow ? `<span class="now-here"> ←今ここ</span>` : "";
      return `<tr${cls}><td>${l.leg_id}</td><td>${esc(APP_LABELS[l.app])}</td><td style="text-align:right">${l.estimated_minutes}分${nowMark}</td></tr>`;

  }

  let evtHtml;
  if (!exchangeLog.length) {
    evtHtml = `<p style="color:#9CA3AF;font-size:12px">まだイベントはありません</p>`;
  } else {
    const recent = [...exchangeLog].reverse().slice(0, 10);
    const lis = recent.map(e => {
      const cls = e.app === "LogiOS" ? "ea-os" : "ea-app";
      return `<li><span class="et">${esc(e.timestamp)}</span><span class="ea ${cls}">${esc(e.app)}</span><span>${esc(e.event)}</span></li>`;
    }).join("");
    evtHtml = `<ul class="event-mini">${lis}</ul>`;
  }

  return `
    <div class="panel-card">
      <h3>■ 現在の状態</h3>

      ${planHtml}
    </div>
    <div class="panel-card">
      <h3>■ 直近イベント履歴</h3>
      ${evtHtml}
    </div>`;

function isAfterApp(app) {
  const order = ["app01","app02","app03","app04","app05","app06","app07"];
  const idx = order.indexOf(app);
  if (currentState === "ALL_DONE") return true;
  if (currentState === "OS_PLANNING" || currentState === "OS_PLAN_READY") return idx === 0;
  if (currentState === `${app.toUpperCase()}_DONE`) return true;
  const curIdx = order.findIndex(a => currentState.includes(a.toUpperCase()));
  if (curIdx > idx) return true;
  return false;
}

function getStateLabelHtml(s) {
  if (s === "IDLE")          return `<span class="badge badge-idle">待機中</span>`;
  if (s === "OS_PLANNING")   return `<span class="badge badge-running">輸送プラン作成中...</span>`;
  if (s === "OS_PLAN_READY") return `<span class="badge badge-plan">輸送プラン完成 ✅</span>`;
  if (s === "ALL_DONE")      return `<span class="badge badge-complete">全工程完了 🎉</span>`;
  if (s.includes("_RUNNING"))       return `<span class="badge badge-running">処理中...</span>`;
  if (s.includes("_DONE"))          return `<span class="badge badge-done">完了 ✅</span>`;
  if (s.includes("OS_INSTRUCTING")) return `<span class="badge badge-running">指示送信中...</span>`;
  return `<span class="badge badge-idle">${esc(s)}</span>`;
}

  const upper = appKey.toUpperCase();
  let statusBadge = `<span class="badge badge-idle">未処理</span>`;
  if (currentState === `${upper}_RUNNING` || currentState === `OS_INSTRUCTING_${upper}`)
    statusBadge = `<span class="badge badge-running">処理中...</span>`;
  else if (report)
    statusBadge = `<span class="badge badge-done">完了 ✅</span>`;

  // ■ 発行ID（shipment_idは表示しない。own_idを各主体のフォーマットラベルで表示）
  const idLabel = APP_ID_LABELS[appKey] || "Shipment ID";

    </div>` : "";

  // ■ LogiOSに渡したデータ（quantity, weight_kg, status, leg_info など）
  const dataEvents = logs.filter(l =>
    l.quantity !== undefined || l.weight_kg !== undefined ||
    l.status !== undefined || l.leg_info !== undefined

  let dataHtml = "";
  if (dataEvents.length > 0) {
    const d = dataEvents[dataEvents.length - 1];
    const fields = [];
    if (d.quantity  !== undefined) fields.push({ label: "個数",    value: d.quantity + " 個" });
    if (d.weight_kg !== undefined) fields.push({ label: "重量",    value: d.weight_kg + " kg" });
    if (d.status    !== undefined) fields.push({ label: "状態",    value: d.status, cls: d.status === "OK" ? "data-status-ok" : "data-status-ng" });
    if (d.leg_info  !== undefined) fields.push({ label: "区間",    value: d.leg_info });
    const cells = fields.map(f => `
      <div class="data-item">
        <div class="label">${esc(f.label)}</div>
        <div class="value ${f.cls || ""}">${esc(f.value)}</div>
      </div>`).join("");
    dataHtml = `
      <div class="card">
        <h3>■ LogiOSに渡したデータ</h3>
        <div class="data-grid">${cells}</div>
      </div>`;
  }

  // ■ イベント記録
  const eventsHtml = logs.length ? `
    <div class="card">
      <h3>■ イベント記録</h3>
      <ul class="event-list">
        ${logs.map(l => `<li><span class="event-time">${esc(l.timestamp)}</span><span class="event-text">${esc(l.event)}</span></li>`).join("")}
      </ul>
    </div>` : "";

  el.innerHTML = `
    <div class="card">
      <div class="app-svg-wrap">${svg}</div>
      <h2 style="text-align:center">${esc(label)}</h2>
      <p style="text-align:center;margin-top:6px">状態: ${statusBadge}</p>
    </div>
    ${reportHtml}
    ${dataHtml}
    ${eventsHtml}`;
}

function renderAllAppTabs() {
  ["app01","app02","app03","app04","app05","app06","app07"].forEach(renderAppTab);
}

// ═══════════════════════════════════════════════════
// 名寄せ台帳
// ═══════════════════════════════════════════════════
function renderIdChainTab() {
  const el = document.getElementById("tab-chain-content");
  if (!el) return;
  if (!idChain.shipment_id) {
    el.innerHTML = `<div class="card"><p style="color:#9CA3AF">シミュレーション開始後に表示されます。</p></div>`;
    return;
  }
  const items = idChain.id_chain.map((entry, i) => {
    const label = APP_LABELS[entry.app] || entry.app;
    const arrow = i < idChain.id_chain.length - 1 ? `<div class="chain-arrow">↓</div>` : "";
    return `
      <div class="chain-item">
        <div class="chain-app">${esc(label)}</div>
        <div class="chain-ids">
          <div class="chain-own">own_id: ${esc(entry.own_id)}</div>
          <div class="chain-prev">prev_ref: ${esc(entry.prev_ref || "(起点)")}</div>
        </div>
      </div>${arrow}`;
  }).join("");

  el.innerHTML = `
    <div class="card">
      <h2>🔗 名寄せ台帳（バケツリレー型参照チェーン）</h2>
      <p style="margin-bottom:6px;color:#6B7280;font-size:13px">
        共通キー（LogiOS内部）: <strong style="font-family:monospace">${esc(idChain.shipment_id)}</strong>
      </p>
      <p style="margin-bottom:14px;font-size:12px;color:#374151;line-height:1.6">
        各主体は<strong>自社フォーマットのID</strong>を使いながら、
        <strong>prev_ref（直前主体からの参照）</strong>をバケツリレーすることで
        ①→⑦まで追跡可能。LogiOSはこの連鎖をたどってshipment_idまで遡れる。
      </p>
      ${items}
    </div>`;
}

// ═══════════════════════════════════════════════════
// 全体ログ（LogiOS内部参照列あり）
// ═══════════════════════════════════════════════════
function renderExchangeLogTab() {
  const el = document.getElementById("tab-log-content");
  if (!el) return;
  if (!exchangeLog.length) {
    el.innerHTML = `<div class="card"><p style="color:#9CA3AF">ログはまだありません。</p></div>`;
    return;
  }

  const rows = exchangeLog.map(e => {
    const isOs = e.app === "LogiOS";
    const appCls = isOs ? "log-os" : "log-app";

    // LogiOS内部参照列
    let refHtml = "";
    if (e.logi_ref) {
      const isLinked = String(e.logi_ref).includes("✓ 紐づけ済み");
      refHtml = `<span class="${isLinked ? "log-ref-linked" : "log-ref"}">${esc(e.logi_ref)}</span>`;
    }

    return `<tr>
      <td>${esc(e.timestamp)}</td>
      <td class="${appCls}">${esc(e.app)}</td>
      <td>${esc(e.event)}</td>
      <td>${refHtml}</td>
    </tr>`;
  }).join("");

  el.innerHTML = `
    <div style="margin-bottom:8px;font-size:12px;color:#6B7280;padding:0 2px">
      💡 このタブはLogiOSの視点。各主体の独自IDがどの共通Shipment IDに紐づくかを追跡できます。
    </div>
    <div class="log-wrap">
      <table class="log-table">
        <thead>
          <tr>
            <th>時刻</th>
            <th>アプリ</th>
            <th>イベント</th>
            <th>LogiOS内部参照</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  const wrap = el.querySelector(".log-wrap");
  if (wrap) wrap.scrollTop = wrap.scrollHeight;
}

// ═══════════════════════════════════════════════════
// タブ切り替え・リスタート・起動
// ═══════════════════════════════════════════════════
function switchTab(tabId) {
  document.querySelectorAll(".tab-content").forEach(el => el.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(el => el.classList.remove("active"));
  document.getElementById(`tab-${tabId}-content`).classList.add("active");
  document.querySelector(`[data-tab="${tabId}"]`).classList.add("active");
}

function restart() {
  simRunning   = false;
  exchangeLog  = [];
  appReports   = {};
  currentPlan  = null;
  rightPanel   = { instruction: null, leg: null, ownId: null, ownIssued: false, reportDone: false };
  resetChain();
  currentState = "IDLE";
  renderOsTab();
  renderAllAppTabs();
  renderIdChainTab();
  renderExchangeLogTab();
  setTimeout(() => runSimulation(), 100);
}

window.addEventListener("DOMContentLoaded", () => {
  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.addEventListener("click", () => switchTab(btn.dataset.tab));
  });
  document.getElementById("restartBtn").addEventListener("click", restart);
  renderOsTab();
  renderAllAppTabs();
  renderIdChainTab();
  renderExchangeLogTab();
  runSimulation();
});
</script>
</body>
</html>
